                        </button>
                        <button
                            class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg bg-surface-container-highest border border-outline-variant/20 flex items-center justify-center hover:bg-primary/10 transition-colors shadow-sm group relative">
                            <span
                                class="font-label text-xs text-on-background group-hover:text-primary transition-colors">2</span>
                        </button>
                        <button
