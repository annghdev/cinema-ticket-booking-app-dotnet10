name: Cinema Ticket Booking Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore CinemaTicketBooking.slnx

    - name: Run Tests
      run: dotnet test CinemaTicketBooking.slnx --no-restore -c Release

  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # SERVICE 1: WebServer (Backend)
    - name: Build and Push WebServer
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/CinemaTicketBooking.WebServer/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/cinema-webserver:latest
          ${{ secrets.DOCKER_USERNAME }}/cinema-webserver:${{ github.sha }}

    # SERVICE 2: WebApp (Frontend React)
    - name: Build and Push WebApp
      uses: docker/build-push-action@v5
      with:
        context: src/CinemaTicketBooking.WebApp
        file: src/CinemaTicketBooking.WebApp/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/cinema-webapp:latest
          ${{ secrets.DOCKER_USERNAME }}/cinema-webapp:${{ github.sha }}

  deploy-to-coolify:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          curl --request GET '${{ secrets.COOLIFY_WEBHOOK }}' \
               --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'
