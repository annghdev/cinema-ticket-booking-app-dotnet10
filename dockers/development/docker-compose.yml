name: cinema-ticket-booking-dev

services:
  webserver:
    build:
      context: ../..
      dockerfile: src/CinemaTicketBooking.WebServer/Dockerfile
      args:
        BUILD_CONFIGURATION: Debug
    container_name: cinema-dev-webserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__cinemadb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-cinemadb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD:-redis},abortConnect=false
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-CinemaTicketBooking.Dev.SigningKey.ChangeMe.1234567890}
      App__PublicBaseUrl: http://localhost:${WEBSERVER_PORT:-8080}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:5173}
      LOKI_ENDPOINT: http://loki:3100
      TEMPO_OTLP_ENDPOINT: http://tempo:4317
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      Minio__BucketName: ${MINIO_BUCKET_NAME:-cinema-ticket-booking}
      Minio__UseSsl: "false"
      Minio__PublicBaseUrl: ${MINIO_PUBLIC_URL:-http://localhost:9000}/${MINIO_BUCKET_NAME:-cinema-ticket-booking}
    ports:
      - "${WEBSERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cinema_dev

  webapp:
    build:
      context: ../../src/CinemaTicketBooking.WebApp
      dockerfile: Dockerfile
    container_name: cinema-dev-webapp
    environment:
      VITE_API_BASE_URL: http://localhost:${WEBSERVER_PORT:-8080}
    ports:
      - "${WEBAPP_PORT:-5173}:5173"
    volumes:
      - ../../src/CinemaTicketBooking.WebApp:/app
      - webapp_node_modules:/app/node_modules
    depends_on:
      webserver:
        condition: service_started
    restart: unless-stopped
    networks:
      - cinema_dev

  postgres:
    image: postgres:17-alpine
    container_name: cinema-dev-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cinemadb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cinemadb}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - cinema_dev

  redis:
    image: redis:7.4-alpine
    container_name: cinema-dev-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - cinema_dev

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    container_name: cinema-dev-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-cinemadb}?sslmode=disable
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cinema_dev

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: cinema-dev-redis-exporter
    command:
      - --redis.addr=redis://redis:6379
      - --redis.password=${REDIS_PASSWORD:-redis}
      - --include-system-metrics
      - --check-keys=CinemaTicketBooking:*
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cinema_dev

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cinema-dev-cadvisor
    privileged: true
    command:
      - --docker_root=/var/lib/docker
      - --store_container_labels=true
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - cinema_dev

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cinema-dev-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - webserver
      - postgres-exporter
      - redis-exporter
      - cadvisor
    restart: unless-stopped
    networks:
      - cinema_dev

  loki:
    image: grafana/loki:3.2.1
    container_name: cinema-dev-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped
    networks:
      - cinema_dev

  tempo:
    image: grafana/tempo:2.6.1
    container_name: cinema-dev-tempo
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "${TEMPO_PORT:-3200}:3200"
      - "${TEMPO_OTLP_GRPC_PORT:-4317}:4317"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped
    networks:
      - cinema_dev

  minio:
    image: minio/minio:latest
    container_name: cinema-dev-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - cinema_dev

  grafana:
    image: grafana/grafana:11.6.11
    container_name: cinema-dev-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped
    networks:
      - cinema_dev

networks:
  cinema_dev:
    name: cinema-ticket-booking-dev-net
    driver: bridge

volumes:
  webapp_node_modules:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  minio_data:
